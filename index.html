<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Binna's Logistics Global | China-Nigeria Shipping &amp; Sourcing</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='100%' height='100%' fill='%23ffffff' rx='6'/><text x='50%' y='60%' font-family='system-ui, -apple-system, sans-serif' font-weight='900' font-size='16' text-anchor='middle' fill='%230f4c81'>B<tspan fill='%23dc2626'>G</tspan></text></svg>" />
    <script>
      // Gracefully capture and silence benign WebSocket or Vite HMR errors before any module loads
      (function() {
        const isWsError = function(str) {
          if (!str) return false;
          const s = String(str).toLowerCase();
          return s.includes("websocket") || 
                 s.includes("web socket") || 
                 s.includes("hmr") || 
                 s.includes("closed without opened");
        };

        // Intercept console.error to prevent platform logging overlays for benign WebSocket failures
        const originalConsoleError = console.error;
        console.error = function(...args) {
          const msg = args.map(function(arg) {
            try {
              if (!arg) return "";
              return arg.message || arg.stack || String(arg);
            } catch (e) {
              return "";
            }
          }).join(" ");
          if (isWsError(msg)) {
            return;
          }
          originalConsoleError.apply(console, args);
        };

        // Intercept console.warn to prevent platform logging overlays for benign WebSocket warnings
        const originalConsoleWarn = console.warn;
        console.warn = function(...args) {
          const msg = args.map(function(arg) {
            try {
              if (!arg) return "";
              return arg.message || String(arg);
            } catch (e) {
              return "";
            }
          }).join(" ");
          if (isWsError(msg)) {
            return;
          }
          originalConsoleWarn.apply(console, args);
        };

        window.addEventListener("unhandledrejection", function(event) {
          const reason = event.reason ? (event.reason.message || String(event.reason)) : "";
          if (isWsError(reason)) {
            event.preventDefault();
            event.stopPropagation();
          }
        }, true);

        window.addEventListener("error", function(event) {
          const msg = event.message || "";
          if (isWsError(msg)) {
            event.preventDefault();
            event.stopPropagation();
          }
        }, true);
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
